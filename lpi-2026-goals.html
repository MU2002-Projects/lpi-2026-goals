<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeede8;
      --text: #1a1a1a; --text-secondary: #6b6b6b;
      --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-lg: 12px;
      --purple-bg: #EEEDFE; --purple-border: #AFA9EC; --purple-text: #3C3489;
      --teal-bg: #E1F5EE; --teal-border: #5DCAA5; --teal-text: #085041;
      --green-bg: #EAF3DE; --green-text: #3B6D11;
      --amber-bg: #FAEEDA; --amber-border: #EF9F27; --amber-text: #633806;
      --red-bg: #FCEBEB; --red-border: #F09595; --red-text: #791F1F;
      --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text); font-size: 15px; line-height: 1.6; min-height: 100vh; }
    .app { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }
    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
    .header p { font-size: 14px; color: var(--text-secondary); }
    .phase-bar { display: flex; border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.5rem; background: var(--bg-secondary); }
    .phase-tab { flex: 1; padding: 10px 8px; font-size: 12px; color: var(--text-secondary); cursor: default; border: none; background: transparent; border-right: 0.5px solid var(--border); text-align: center; font-family: inherit; }
    .phase-tab:last-child { border-right: none; }
    .phase-tab.active { background: var(--bg); color: var(--text); font-weight: 500; }
    .phase-tab.admin-nav { cursor: pointer; }
    .phase-tab.admin-nav:hover { background: var(--bg); }
    .phase-tab.locked { opacity: 0.38; }
    .phase-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .dot-green { background: #3B6D11; } .dot-amber { background: #BA7517; }
    .dot-purple { background: #534AB7; } .dot-teal { background: #0F6E56; }
    .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    select, input[type=text], input[type=email], textarea { font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg-secondary); border: 0.5px solid var(--border-md); border-radius: var(--radius-md); padding: 7px 10px; }
    select { cursor: pointer; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--purple-border); box-shadow: 0 0 0 2px rgba(83,74,183,0.12); }
    textarea { resize: vertical; min-height: 80px; width: 100%; }
    .badge { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 8px; border-radius: 6px; }
    .badge-purple { background: var(--purple-bg); color: var(--purple-text); }
    .badge-teal { background: var(--teal-bg); color: var(--teal-text); }
    .badge-green { background: var(--green-bg); color: var(--green-text); }
    .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
    .badge-gray { background: var(--gray-bg); color: var(--gray-text); }
    .badge-orange { background: var(--amber-bg); color: var(--amber-text); }
    .panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .panel-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .panel-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
    .panel-admin { border-color: var(--purple-border); }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 140px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 13px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: transparent; color: var(--text); cursor: pointer; font-family: inherit; transition: background 0.12s; }
    .btn:hover { background: var(--bg-secondary); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--purple-bg); border-color: var(--purple-border); color: var(--purple-text); }
    .btn-primary:hover { background: #CECBF6; }
    .btn-teal { background: var(--teal-bg); border-color: var(--teal-border); color: var(--teal-text); }
    .btn-teal:hover { background: #9FE1CB; }
    .btn-amber { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber-text); }
    .btn-amber:hover { background: #FAC775; }
    .btn-danger { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-full { width: 100%; justify-content: center; margin-top: 4px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .notice { background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
    .notice-amber { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber-text); }
    .notice-teal { background: var(--teal-bg); border-color: var(--teal-border); color: var(--teal-text); }
    .idea-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
    .idea-card.mine { border-left: 3px solid var(--purple-border); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    .idea-card.flagged { border-left: 3px solid var(--amber-border); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    .idea-card.mine.flagged { border-left: 3px solid var(--amber-border); }
    .idea-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .idea-title { font-size: 15px; font-weight: 500; }
    .idea-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .idea-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 8px; }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
    .anon-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--bg-secondary); border: 0.5px solid var(--border-md); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; color: var(--text-secondary); }
    .qa-section { border-top: 0.5px solid var(--border); padding-top: 10px; margin-top: 10px; }
    .qa-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .comment { display: flex; gap: 8px; margin-bottom: 8px; }
    .comment-body { flex: 1; }
    .comment-who { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
    .comment-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .comment-input-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 8px; }
    .comment-input-row textarea { flex: 1; min-height: 38px; font-size: 13px; }
    .flag-section { border-top: 0.5px solid var(--border); padding-top: 10px; margin-top: 8px; }
    .flag-notice { background: var(--amber-bg); border: 0.5px solid var(--amber-border); border-radius: var(--radius-md); padding: 8px 12px; font-size: 12px; color: var(--amber-text); margin-bottom: 8px; }
    .flag-input-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .flag-input-row input { flex: 1; font-size: 12px; }
    .votes-bar { background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .vote-dots { display: flex; gap: 4px; }
    .vote-dot { width: 11px; height: 11px; border-radius: 50%; }
    .vote-section { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .vote-count { font-size: 22px; font-weight: 500; min-width: 30px; text-align: center; }
    .vote-label { font-size: 11px; color: var(--text-secondary); }
    .bar-bg { background: var(--bg-secondary); border-radius: 4px; height: 7px; overflow: hidden; flex: 1; }
    .bar-fill { height: 7px; border-radius: 4px; transition: width 0.3s; }
    .bar-fill-purple { background: #534AB7; }
    .bar-fill-teal { background: #1D9E75; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .bar-votes { font-size: 12px; color: var(--text-secondary); min-width: 56px; }
    .merge-list { margin-top: 1rem; border-top: 0.5px solid var(--border); padding-top: 1rem; }
    .merge-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
    .merge-item:last-child { border-bottom: none; }
    .merge-item input[type=checkbox] { margin-top: 3px; flex-shrink: 0; width: 15px; height: 15px; cursor: pointer; }
    .merge-item-title { font-size: 13px; font-weight: 500; }
    .merge-item-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; text-align: center; }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 500; }
    .result-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; display: flex; gap: 1rem; align-items: flex-start; }
    .result-card.winner { border: 2px solid #1D9E75; }
    .result-rank { font-size: 20px; font-weight: 500; min-width: 34px; text-align: center; color: var(--text-secondary); padding-top: 2px; }
    .rank-gold { color: #BA7517; } .rank-silver { color: #888780; } .rank-bronze { color: #993C1D; }
    .result-body { flex: 1; }
    .result-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .result-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .loading { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 14px; }
    .empty { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 14px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--purple-text); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 400px; }
    .auth-card h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    .auth-card .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5; }
    .auth-card input[type=email] { width: 100%; margin-bottom: 12px; }
    .error-msg { font-size: 13px; color: var(--red-text); background: var(--red-bg); border: 0.5px solid var(--red-border); border-radius: var(--radius-md); padding: 8px 12px; margin-bottom: 1rem; }
    .success-msg { font-size: 13px; color: var(--teal-text); background: var(--teal-bg); border: 0.5px solid var(--teal-border); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 1rem; line-height: 1.5; }
    .signout-btn { font-size: 12px; color: var(--text-secondary); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; font-family: inherit; }
    .signout-btn:hover { color: var(--text); }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://tlbekvrkqcpxzzkwslpx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsYmVrdnJrcWNweHp6a3dzbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODA5NzEsImV4cCI6MjA5MTM1Njk3MX0.Vg23_217SF0mc2q7jbXSuxSQ0t4XTt-a5QG7sFC2YZU";
const ADMIN = "Andy Auffant";
const VOTES_PER_PERSON = 5;
const CATEGORIES = ["Operational efficiency","Client delivery","Team development","Business development","Technology & tools"];

// ── Team member PIN map ───────────────────────────────────────────────────────
// Format: "Display Name": "PIN"
// Share each person's PIN with them privately via Teams or text
const TEAM_PINS = {
  "Andy Auffant":    "7392",
  "Anand Banthia":   "5841",
  "Andrew Caldwell": "2763",
  "Angela Schunk":   "9154",
  "Kelsey Abel":     "4827",
  "Paige Gardner":   "6519",
  "Tracy Friend":    "3286",
};
const TEAM_MEMBERS = Object.keys(TEAM_PINS);

const AVATARS = {
  "Anand Banthia":   { color:"#E1F5EE", text:"#085041", initials:"AB" },
  "Andrew Caldwell": { color:"#FAEEDA", text:"#854F0B", initials:"AC" },
  "Angela Schunk":   { color:"#FBEAF0", text:"#72243E", initials:"AS" },
  "Andy Auffant":    { color:"#EEEDFE", text:"#3C3489", initials:"AA" },
  "Kelsey Abel":     { color:"#E6F1FB", text:"#0C447C", initials:"KA" },
  "Paige Gardner":   { color:"#EAF3DE", text:"#3B6D11", initials:"PG" },
  "Tracy Friend":    { color:"#FAECE7", text:"#993C1D", initials:"TF" },
};

// Supabase used only for data, not auth

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(path, method="GET", body=null) {
  const opts = { method, headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": method==="POST"?"return=representation":"" }};
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, opts);
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
const db = {
  getState:    ()        => api("app_state?id=eq.1"),
  setState:    (phase)   => api("app_state?id=eq.1","PATCH",{phase,updated_at:new Date().toISOString()}),
  getIdeas:    ()        => api("ideas?order=created_at.asc"),
  addIdea:     (d)       => api("ideas","POST",d),
  updateIdea:  (id,d)    => api(`ideas?id=eq.${id}`,"PATCH",d),
  deleteIdea:  (id)      => api(`ideas?id=eq.${id}`,"DELETE"),
  getComments: ()        => api("comments?order=created_at.asc"),
  addComment:  (d)       => api("comments","POST",d),
  getFlags:    ()        => api("flags?order=created_at.asc"),
  addFlag:     (d)       => api("flags","POST",d),
  updateFlag:  (id,d)    => api(`flags?id=eq.${id}`,"PATCH",d),
  deleteFlag:  (iid,au)  => api(`flags?idea_id=eq.${iid}&author=eq.${encodeURIComponent(au)}`,"DELETE"),
  getVotes:    ()        => api("votes?order=updated_at.asc"),
  upsertVote:  (d)       => api("votes","POST",{...d,updated_at:new Date().toISOString()}),
  patchVote:   (iid,au,c)=> api(`votes?idea_id=eq.${iid}&author=eq.${encodeURIComponent(au)}`,"PATCH",{count:c,updated_at:new Date().toISOString()}),
  deleteVotes: (id)      => api(`votes?idea_id=eq.${id}`,"DELETE"),
  logLogin:    (name)    => api("logins","POST",{user_name:name}),
  getPin:      (name)    => api(`users?name=eq.${encodeURIComponent(name)}&select=pin`),
  updatePin:   (name, pin) => api(`users?name=eq.${encodeURIComponent(name)}`,"PATCH",{pin, updated_at:new Date().toISOString()}),
};

// ── State ────────────────────────────────────────────────────────────────────
let currentUser=null, userEmail=null, phase=0;
let ideas=[], comments=[], flags=[], votes=[];
let editingId=null, editDraft={};
let showMergePanel=false, mergeSelections={};
let commentDrafts={}, flagDrafts={};
let appLoading=true;
let showSplash=false;

function isAdmin(){ return currentUser===ADMIN; }
function myVotesUsed(){ return votes.filter(v=>v.author===currentUser).reduce((s,v)=>s+v.count,0); }
function myVotesRemaining(){ return VOTES_PER_PERSON-myVotesUsed(); }
function votesForIdea(id){ return votes.filter(v=>v.idea_id===id).reduce((s,v)=>s+v.count,0); }
function myVotesForIdea(id){ return (votes.find(v=>v.idea_id===id&&v.author===currentUser)||{count:0}).count; }
function maxVotes(){ const s=ideas.filter(i=>i.submitted).map(i=>votesForIdea(i.id)); return Math.max(1,...s); }
function flagsForIdea(id){ return flags.filter(f=>f.idea_id===id); }
function commentsForIdea(id){ return comments.filter(c=>c.idea_id===id); }
function esc(s){ if(!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function avatarEl(name,size=26){
  const a=AVATARS[name]||{color:"#F1EFE8",text:"#5F5E5A",initials:(name||"?").slice(0,2).toUpperCase()};
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${a.color};color:${a.text};">${a.initials}</div>`;
}
function anonEl(size=26){ return `<div class="anon-avatar" style="width:${size}px;height:${size}px;">?</div>`; }
function displayAuthor(idea,mode){
  const mine=idea.author===currentUser;
  const anon=mode==="p1"||mode==="p2";
  const allAuthors=[idea.author,...(idea.merged_authors||[])];
  const isMerged=idea.merged&&idea.merged_authors?.length>0;

  if(anon&&!mine){
    if(isMerged){
      // Show multiple anon avatars for merged ideas
      const anonAvatars=allAuthors.map(()=>anonEl()).join(`<div style="margin-left:-8px;">`)+`</div>`.repeat(allAuthors.length-1);
      const avHtml=`<div style="display:flex;align-items:center;">${allAuthors.map((_,i)=>`<div style="${i>0?"margin-left:-8px;":""}">${anonEl()}</div>`).join("")}</div>`;
      return {av:avHtml, name:`<em>Anonymous (${allAuthors.length})</em>`};
    }
    return {av:anonEl(),name:`<em>Anonymous</em>`};
  }

  if(isMerged){
    const avHtml=`<div style="display:flex;align-items:center;">${allAuthors.map((a,i)=>`<div style="${i>0?"margin-left:-8px;":""}">${avatarEl(a)}</div>`).join("")}</div>`;
    const isMineInMerge=allAuthors.includes(currentUser);
    const names=allAuthors.map(a=>a===currentUser?`${esc(a)} <em style="opacity:0.6;">(you)</em>`:esc(a)).join(" & ");
    return {av:avHtml, name:names};
  }

  const label=mine&&anon?`${esc(idea.author)} <em style="opacity:0.6;">(you)</em>`:esc(idea.author);
  return {av:avatarEl(idea.author),name:label};
}

// ── Auth ─────────────────────────────────────────────────────────────────────
function initAuth(){
  const saved = localStorage.getItem("lpi_user");
  if(saved && TEAM_PINS[saved]){
    currentUser = saved;
    loadAll();
  } else {
    appLoading = false;
    renderLoginScreen();
  }
}

async function verifyPin(name, pin){
  if(!name){ renderLoginScreen("Please select your name."); return; }
  if(!pin.trim()){ renderLoginScreen("Please enter your PIN.", name); return; }
  try {
    const res = await db.getPin(name);
    if(res && res.length > 0 && pin.trim() === res[0].pin){
      currentUser = name;
      localStorage.setItem("lpi_user", name);
      db.logLogin(name);
      showSplash = true; appLoading = false; renderSplash();
    } else {
      renderLoginScreen("Incorrect PIN — please try again or contact Andy.", name);
    }
  } catch(e) {
    renderLoginScreen("Something went wrong — please try again.", name);
  }
}

async function changePin(newPin, confirmPin){
  if(!newPin.trim() || newPin.length < 4){ renderChangePinScreen("PIN must be at least 4 digits."); return; }
  if(newPin !== confirmPin){ renderChangePinScreen("PINs don't match — please try again."); return; }
  if(!/^\d+$/.test(newPin)){ renderChangePinScreen("PIN must contain numbers only."); return; }
  try {
    await db.updatePin(currentUser, newPin.trim());
    renderChangePinScreen("", true);
  } catch(e) {
    renderChangePinScreen("Something went wrong — please try again.");
  }
}

function signOut(){
  currentUser=null; userEmail=null;
  localStorage.removeItem("lpi_user");
  ideas=[]; comments=[]; flags=[]; votes=[];
  renderLoginScreen();
}

// ── Data ─────────────────────────────────────────────────────────────────────
async function loadAll(){
  appLoading=true; render();
  try{
    const [sa,ia,ca,fa,va] = await Promise.all([db.getState(),db.getIdeas(),db.getComments(),db.getFlags(),db.getVotes()]);
    phase=sa[0]?.phase??0; ideas=ia||[]; comments=ca||[]; flags=fa||[]; votes=va||[];
  } catch(e){ alert("Error loading data: "+e.message); }
  appLoading=false; render();
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function setPhase(p){ if(!isAdmin()) return; await db.setState(p); phase=p; showMergePanel=false; mergeSelections={}; render(); }
async function submitIdea(draft,submitted){
  const ideaCount = ideas.length + 1;
  const res=await db.addIdea({author:currentUser,title:draft.title.trim(),category:draft.category,description:draft.description.trim(),impact:draft.impact||null,effort:draft.effort||null,submitted,merged:false,merged_authors:[],phase_created:0,idea_number:ideaCount});
  ideas.push(res[0]); render();
}
async function finalizeIdea(id){ await db.updateIdea(id,{submitted:true}); const i=ideas.find(i=>i.id===id); if(i) i.submitted=true; render(); }
async function saveEdit(id){
  await db.updateIdea(id,{title:editDraft.title,category:editDraft.category,description:editDraft.description,impact:editDraft.impact||null,effort:editDraft.effort||null});
  const i=ideas.find(i=>i.id===id); if(i) Object.assign(i,editDraft);
  editingId=null; render();
}
async function deleteIdea(id){
  if(!confirm("Delete this idea?")) return;
  await db.deleteIdea(id);
  ideas=ideas.filter(i=>i.id!==id); comments=comments.filter(c=>c.idea_id!==id);
  flags=flags.filter(f=>f.idea_id!==id); votes=votes.filter(v=>v.idea_id!==id); render();
}
async function addComment(ideaId,text){
  if(!text.trim()) return;
  const res=await db.addComment({idea_id:ideaId,author:currentUser,text:text.trim()});
  comments.push(res[0]); commentDrafts[ideaId]=""; render();
}
async function flagIdea(ideaId,note){
  if(!note.trim()){alert("Please note which idea this is similar to.");return;}
  const existing=flags.find(f=>f.idea_id===ideaId&&f.author===currentUser);
  if(existing){await db.updateFlag(existing.id,{note:note.trim()});existing.note=note.trim();}
  else{const res=await db.addFlag({idea_id:ideaId,author:currentUser,note:note.trim()});flags.push(res[0]);}
  flagDrafts[ideaId]=""; render();
}
async function unflag(ideaId){ await db.deleteFlag(ideaId,currentUser); flags=flags.filter(f=>!(f.idea_id===ideaId&&f.author===currentUser)); render(); }
async function castVote(ideaId,delta){
  const cur=myVotesForIdea(ideaId), newVal=Math.max(0,cur+delta), diff=newVal-cur;
  if(diff>0&&myVotesRemaining()<diff) return;
  const existing=votes.find(v=>v.idea_id===ideaId&&v.author===currentUser);
  if(existing){await db.patchVote(ideaId,currentUser,newVal);existing.count=newVal;}
  else{const res=await db.upsertVote({idea_id:ideaId,author:currentUser,count:newVal});votes.push(res?.[0]||{idea_id:ideaId,author:currentUser,count:newVal});}
  render();
}
async function executeMerge(){
  const ids=Object.keys(mergeSelections).filter(k=>mergeSelections[k]);
  if(ids.length<2){alert("Select at least 2 ideas to merge.");return;}
  const selected=ids.map(id=>ideas.find(i=>i.id===id)).filter(Boolean);
  const primary=selected[0];
  const allAuthors=[...new Set(selected.flatMap(i=>[i.author,...(i.merged_authors||[])]))];
  const allComments=selected.flatMap(i=>commentsForIdea(i.id));
  const newIdea=await db.addIdea({author:primary.author,title:primary.title,category:primary.category,description:primary.description,impact:primary.impact,effort:primary.effort,submitted:true,merged:true,merged_authors:allAuthors.filter(a=>a!==primary.author),phase_created:1});
  const newId=newIdea[0].id;
  for(const c of allComments) await db.addComment({idea_id:newId,author:c.author,text:c.text});
  for(const id of ids){await db.deleteVotes(id);await db.deleteIdea(id);}
  mergeSelections={}; showMergePanel=false; await loadAll();
}

// ── Inline handlers ──────────────────────────────────────────────────────────
window.vote=(id,d)=>castVote(id,d);
window.startEdit=(id)=>{const i=ideas.find(i=>i.id===id);if(!i)return;editingId=id;editDraft={title:i.title,category:i.category,description:i.description,impact:i.impact||"",effort:i.effort||""};render();};
window.commitEdit=(id)=>{editDraft.title=document.getElementById("edit-title")?.value||editDraft.title;editDraft.category=document.getElementById("edit-cat")?.value||editDraft.category;editDraft.description=document.getElementById("edit-desc")?.value||editDraft.description;editDraft.impact=document.getElementById("edit-impact")?.value||"";editDraft.effort=document.getElementById("edit-effort")?.value||"";saveEdit(id);};
window.cancelEdit=()=>{editingId=null;render();};
window.finalize=(id)=>finalizeIdea(id);
window.del=(id)=>deleteIdea(id);
window.submitComment=(id)=>{const el=document.getElementById(`cmt-${id}`);addComment(id,el?.value||commentDrafts[id]||"");};
window.submitFlag=(id)=>{const el=document.getElementById(`flag-${id}`);flagIdea(id,el?.value||flagDrafts[id]||"");};
window.removeflag=(id)=>unflag(id);
window.toggleMerge=()=>{showMergePanel=!showMergePanel;mergeSelections={};render();};
window.toggleMergeItem=(id)=>{mergeSelections[id]=!mergeSelections[id];render();};
window.doMerge=()=>executeMerge();
window.adminGoPhase=(p)=>{if(!isAdmin())return;if(p===3&&phase<3)return;setPhase(p);};
window.advancePhase=()=>setPhase(phase+1);
window.closeVoting=()=>setPhase(3);
window.doSignOut=()=>signOut();
window.dismissSplash=()=>{ showSplash=false; loadAll(); };
window.doVerifyPin=()=>{const name=document.getElementById("login-name")?.value||"";const pin=document.getElementById("login-pin")?.value||"";verifyPin(name,pin);};
window.submitForm=(submitted)=>{
  const title=document.getElementById("d-title")?.value||"";
  const category=document.getElementById("d-cat")?.value||"";
  const description=document.getElementById("d-desc")?.value||"";
  const impact=document.getElementById("d-impact")?.value||"";
  const effort=document.getElementById("d-effort")?.value||"";
  if(submitted&&(!title.trim()||!category||!description.trim())){alert("Please fill in the title, category, and description.");return;}
  if(!submitted&&!title.trim()){alert("Give your idea a title first.");return;}
  submitIdea({title,category,description,impact,effort},submitted);
};

function ideaCard(idea,mode){
  const ismine=idea.author===currentUser, isEditing=editingId===idea.id;
  const {av,name}=displayAuthor(idea,mode);
  const ideaFlags=flagsForIdea(idea.id), ideaComments=commentsForIdea(idea.id);
  const isFlagged=ideaFlags.length>0, myFlag=ideaFlags.find(f=>f.author===currentUser);
  const totalV=votesForIdea(idea.id), myV=myVotesForIdea(idea.id), maxV=maxVotes();
  let cls="idea-card";
  if(ismine) cls+=" mine";
  if(isFlagged&&mode==="p1") cls+=" flagged";
  let h=`<div class="${cls}">`;
  if(isEditing){
    h+=`<div class="form-group"><label>Title</label><input type="text" id="edit-title" value="${esc(editDraft.title)}"></div>`;
    h+=`<div class="form-row"><div class="form-group"><label>Category</label><select id="edit-cat">${CATEGORIES.map(c=>`<option value="${c}" ${editDraft.category===c?"selected":""}>${c}</option>`).join("")}</select></div>`;
    h+=`<div class="form-group"><label>Impact</label><select id="edit-impact"><option value="">—</option>${["High","Medium","Low"].map(v=>`<option ${editDraft.impact===v?"selected":""}>${v}</option>`).join("")}</select></div>`;
    h+=`<div class="form-group"><label>Effort</label><select id="edit-effort"><option value="">—</option>${["High","Medium","Low"].map(v=>`<option ${editDraft.effort===v?"selected":""}>${v}</option>`).join("")}</select></div></div>`;
    h+=`<div class="form-group"><label>Description</label><textarea id="edit-desc">${esc(editDraft.description)}</textarea></div>`;
    h+=`<div class="btn-row"><button class="btn btn-primary btn-sm" onclick="commitEdit('${idea.id}')">Save changes</button><button class="btn btn-sm" onclick="cancelEdit()">Cancel</button></div>`;
    h+=`</div>`;return h;
  }
  const ideaNum = idea.idea_number ? `<span style="font-size:11px;font-weight:400;color:var(--text-secondary);background:var(--bg-secondary);border:0.5px solid var(--border-md);border-radius:4px;padding:2px 7px;margin-right:6px;">Idea #${idea.idea_number}</span>` : "";
  h+=`<div class="idea-header"><div><div class="idea-title">${ideaNum}${esc(idea.title)}</div>`;
  h+=`<div class="idea-meta">${av} ${name}`;
  if(idea.merged&&idea.merged_authors?.length){const sn=mode!=="p1"&&mode!=="p2";h+=sn?` &middot; <em style="font-size:11px;">+ ${idea.merged_authors.map(esc).join(", ")}</em>`:` &middot; <em style="font-size:11px;">merged idea</em>`;}
  h+=` &middot; ${esc(idea.category||"Uncategorized")}</div></div>`;
  h+=`<div class="badge-row">`;
  if(idea.merged) h+=`<span class="badge badge-orange">Merged</span>`;
  if(idea.impact) h+=`<span class="badge badge-green">Impact: ${esc(idea.impact)}</span>`;
  if(idea.effort) h+=`<span class="badge badge-amber">Effort: ${esc(idea.effort)}</span>`;
  if(!idea.submitted) h+=`<span class="badge badge-gray">Draft</span>`;
  if(isFlagged&&mode==="p1") h+=`<span class="badge badge-amber">${ideaFlags.length} similar flag${ideaFlags.length!==1?"s":""}</span>`;
  h+=`</div></div><div class="idea-desc">${esc(idea.description)}</div>`;
  if(mode==="p2"){
    h+=`<div class="vote-section"><button class="btn btn-sm" onclick="vote('${idea.id}',-1)" ${myV===0?"disabled":""}>−</button>`;
    h+=`<div style="text-align:center;"><div class="vote-count">${myV}</div><div class="vote-label">your votes</div></div>`;
    h+=`<button class="btn btn-sm btn-primary" onclick="vote('${idea.id}',1)" ${myVotesRemaining()===0&&myV===0?"disabled":""}>+</button>`;
    const myMaxV=Math.max(1,VOTES_PER_PERSON);
    h+=`<div style="flex:1;"><div class="bar-bg"><div class="bar-fill bar-fill-purple" style="width:${Math.round(myV/myMaxV*100)}%"></div></div><div style="font-size:11px;color:var(--text-secondary);margin-top:3px;">${myV} of your vote${myV!==1?"s":""}</div></div></div>`;
  }
  if(mode==="p0"){
    h+=`<div class="btn-row"><button class="btn btn-sm" onclick="startEdit('${idea.id}')">Edit</button>`;
    if(!idea.submitted){h+=`<button class="btn btn-sm btn-primary" onclick="finalize('${idea.id}')">Submit for Phase 2 →</button><button class="btn btn-sm btn-danger" onclick="del('${idea.id}')">Delete</button>`;}
    h+=`</div>`;
  }
  if(mode==="p1"){
    if(ismine||isAdmin()){
      h+=`<div class="btn-row"><button class="btn btn-sm" onclick="startEdit('${idea.id}')">Edit</button>`;
      if(isAdmin()) h+=`<button class="btn btn-sm btn-danger" onclick="del('${idea.id}')">Remove</button>`;
      h+=`</div>`;
    }
    h+=`<div class="qa-section"><div class="qa-title">Q&A & comments (${ideaComments.length})</div>`;
    ideaComments.forEach(c=>{const isMine=c.author===currentUser;const cAv=isMine?avatarEl(c.author):anonEl();const cName=isMine?`${esc(c.author)} <em style="opacity:0.6;">(you)</em>`:`<em>Anonymous</em>`;h+=`<div class="comment">${cAv}<div class="comment-body"><div class="comment-who">${cName}</div><div class="comment-text">${esc(c.text)}</div></div></div>`;});
    h+=`<div class="comment-input-row">${avatarEl(currentUser)}<textarea id="cmt-${idea.id}" placeholder="Ask a question or leave a comment..." onchange="commentDrafts['${idea.id}']=this.value">${esc(commentDrafts[idea.id]||"")}</textarea><button class="btn btn-sm btn-primary" onclick="submitComment('${idea.id}')">Post</button></div></div>`;
    h+=`<div class="flag-section">`;
    if(ideaFlags.length>0){h+=`<div class="flag-notice">`;ideaFlags.forEach(f=>{h+=`<div style="margin-bottom:3px;">${f.author===currentUser?"You flagged":"Someone flagged"} as similar to: <em>${esc(f.note)}</em></div>`;});h+=`</div>`;}
    if(myFlag){h+=`<button class="btn btn-sm" onclick="removeflag('${idea.id}')">Remove my flag</button>`;}
    else{h+=`<div class="flag-input-row"><input type="text" id="flag-${idea.id}" placeholder='Similar to: Idea #...' value="${esc(flagDrafts[idea.id]||"")}" onchange="flagDrafts['${idea.id}']=this.value"><button class="btn btn-sm btn-amber" onclick="submitFlag('${idea.id}')">Flag as similar</button></div>`;}
    h+=`</div>`;
  }
  if(mode==="p1draft"){h+=`<div class="btn-row"><button class="btn btn-sm" onclick="startEdit('${idea.id}')">Edit</button><button class="btn btn-sm btn-primary" onclick="finalize('${idea.id}')">Submit for Phase 2 →</button><button class="btn btn-sm btn-danger" onclick="del('${idea.id}')">Delete</button></div>`;}
  h+=`</div>`;return h;
}

// ── Main render ──────────────────────────────────────────────────────────────
function render(){
  if(!currentUser) return;
  if(appLoading){document.getElementById("root").innerHTML=`<div class="loading"><div class="spinner"></div><br>Loading...</div>`;return;}
  const submitted=ideas.filter(i=>i.submitted);
  const myIdeas=ideas.filter(i=>i.author===currentUser);
  const myDrafts=myIdeas.filter(i=>!i.submitted);
  const mySubmitted=myIdeas.filter(i=>i.submitted);
  const myUnsubmitted=myIdeas.filter(i=>!i.submitted);
  const flaggedCount=submitted.filter(i=>flagsForIdea(i.id).length>0).length;
  const usedVotes=myVotesUsed();

  let tabs=`<div class="phase-bar">`;
  [{label:"Phase 1 — Ideation",dot:"dot-green",dates:"Apr 14 – Apr 27"},{label:"Phase 2 — Refinement",dot:"dot-amber",dates:"Apr 28 – May 4"},{label:"Phase 3 — Voting",dot:"dot-purple",dates:"May 5 – May 10"},{label:"Results",dot:"dot-teal",dates:"May 11"}].forEach((t,i)=>{
    const isCur=i===phase,isUnlocked=i<=phase,isResultsLocked=i===3&&phase<3;
    let cls="phase-tab";
    if(isCur) cls+=" active";
    if(!isUnlocked||isResultsLocked) cls+=" locked";
    if(isAdmin()&&!isCur&&isUnlocked&&!isResultsLocked) cls+=" admin-nav";
    const title=isAdmin()&&!isCur&&isUnlocked&&!isResultsLocked?"title='Click to re-open this phase'":"";
    tabs+=`<button class="${cls}" onclick="adminGoPhase(${i})" ${title}><span class="phase-dot ${t.dot}"></span>${t.label}<span style="display:block;font-size:10px;opacity:0.7;margin-top:2px;font-weight:400;">${t.dates}</span></button>`;
  });
  tabs+=`</div>`;

  let content="";
  if(phase===0){
    content+=`<div class="panel"><div class="panel-title">How this works</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.6;">Your ideas are private during Phase 1 — only you can see them until Phase 2 begins. Take your time, draft freely, and refine before you submit. Ideas will be shared with the full team when Phase 2 opens.</div></div>`;
    content+=`<div class="panel"><div class="panel-title">Submit your idea</div><div class="panel-sub">Fill in the details below and submit before Apr 27.</div>`;
    content+=`<div class="form-group"><label>Idea title</label><input type="text" id="d-title" placeholder="Give it a punchy name..."></div>`;
    content+=`<div class="form-row"><div class="form-group"><label>Category</label><select id="d-cat"><option value="">Select...</option>${CATEGORIES.map(c=>`<option>${c}</option>`).join("")}</select></div><div class="form-group"><label>Estimated impact</label><select id="d-impact"><option value="">Select...</option>${["High","Medium","Low"].map(v=>`<option>${v}</option>`).join("")}</select></div><div class="form-group"><label>Estimated effort</label><select id="d-effort"><option value="">Select...</option>${["High","Medium","Low"].map(v=>`<option>${v}</option>`).join("")}</select></div></div>`;
    content+=`<div class="form-group"><label>Description & rationale</label><textarea id="d-desc" placeholder="What's the idea? Why does it matter? What would success look like?"></textarea></div>`;
    content+=`<div class="btn-row"><button class="btn btn-primary" onclick="submitForm(true)">Submit for Phase 2 →</button><button class="btn" onclick="submitForm(false)">Save as draft</button></div></div>`;
    if(myDrafts.length>0){content+=`<div class="panel"><div class="panel-title">Your drafts</div><div class="panel-sub">Only visible to you. Submit when you're ready.</div>`;myDrafts.forEach(i=>{content+=ideaCard(i,"p0");});content+=`</div>`;}
    if(mySubmitted.length>0){content+=`<div class="panel"><div class="panel-title">Your submitted ideas</div><div class="panel-sub">Locked in for Phase 2 — looking good!</div>`;mySubmitted.forEach(i=>{content+=ideaCard(i,"p0");});content+=`</div>`;}
    if(myIdeas.length===0) content+=`<div class="empty">No ideas yet — fill in the form above to get started!</div>`;
    if(isAdmin()) content+=`<div class="panel panel-admin"><div class="panel-title">Admin controls</div><div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">${submitted.length} of ${ideas.length} idea${ideas.length!==1?"s":""} submitted so far.</div><button class="btn btn-primary" onclick="advancePhase()">Close ideation & open Phase 2 →</button></div>`;
  }
  else if(phase===1){
    content+=`<div class="notice">All submitted ideas are now visible. Authors are anonymous — focus on the ideas! Flag anything that looks like a duplicate.</div>`;
    if(isAdmin()&&flaggedCount>0) content+=`<div class="notice notice-amber">${flaggedCount} idea${flaggedCount!==1?" have":" has"} been flagged as potentially similar. Use the merge tool to consolidate before voting opens.</div>`;
    if(isAdmin()){
      const selCount=Object.values(mergeSelections).filter(Boolean).length;
      content+=`<div class="panel panel-admin"><div class="panel-title">Admin controls</div><div class="btn-row"><button class="btn btn-amber" onclick="toggleMerge()">${showMergePanel?"Cancel merge":"Merge similar ideas"}</button><button class="btn btn-primary" onclick="advancePhase()">Lock ideas & open Phase 3 voting →</button></div>`;
      if(showMergePanel){content+=`<div class="merge-list"><div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">Select 2 or more ideas to merge. The first selected idea's title and description are kept. All comments are combined and all authors credited.</div>`;submitted.forEach(i=>{const f=flagsForIdea(i.id).length;content+=`<div class="merge-item"><input type="checkbox" ${mergeSelections[i.id]?"checked":""} onchange="toggleMergeItem('${i.id}')"><div><div class="merge-item-title">${esc(i.title)}</div><div class="merge-item-meta">${esc(i.category)}${f>0?` · ${f} flag${f!==1?"s":""}`:""}</div></div></div>`;});if(selCount>=2) content+=`<div style="margin-top:10px;"><button class="btn btn-amber" onclick="doMerge()">Merge ${selCount} ideas →</button></div>`;content+=`</div>`;}
      content+=`</div>`;
    }
    if(submitted.length===0) content+=`<div class="empty">No ideas submitted yet.</div>`;
    else submitted.forEach(i=>{content+=ideaCard(i,"p1");});
    if(myUnsubmitted.length>0){content+=`<div class="panel"><div class="panel-title" style="color:var(--text-secondary);">Your unsubmitted drafts</div><div class="panel-sub">Still only visible to you — submit to add to the board.</div>`;myUnsubmitted.forEach(i=>{content+=ideaCard(i,"p1draft");});content+=`</div>`;}
  }
  else if(phase===2){
    const sorted=[...submitted];
    content+=`<div class="notice">Authors are anonymous — vote for the ideas you believe in most!</div>`;
    content+=`<div class="votes-bar"><span style="font-size:14px;">Your votes: <strong style="color:#534AB7;">${myVotesRemaining()} remaining</strong> of ${VOTES_PER_PERSON}</span><div class="vote-dots">`;
    for(let i=0;i<VOTES_PER_PERSON;i++){const f=i<usedVotes;content+=`<div class="vote-dot" style="background:${f?"#534AB7":"var(--bg-secondary)"};border:0.5px solid ${f?"#534AB7":"var(--border-md)"};"></div>`;}
    content+=`</div></div>`;
    if(sorted.length===0) content+=`<div class="empty">No ideas to vote on yet.</div>`;
    else sorted.forEach(i=>{content+=ideaCard(i,"p2");});
    if(isAdmin()){const voters=[...new Set(votes.map(v=>v.author))].length;content+=`<div class="panel panel-admin" style="margin-top:1rem;"><div class="panel-title">Admin controls</div><div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">${voters} team member${voters!==1?"s have":" has"} voted so far.</div><button class="btn btn-teal" onclick="closeVoting()">Close voting & publish results →</button></div>`;}
  }
  else{
    const sorted=[...submitted].sort((a,b)=>votesForIdea(b.id)-votesForIdea(a.id));
    const totalCast=votes.reduce((s,v)=>s+v.count,0), topScore=sorted.length>0?votesForIdea(sorted[0].id):0;
    const voters=[...new Set(votes.map(v=>v.author))].length;
    if(topScore>0){const wc=sorted.filter(i=>votesForIdea(i.id)===topScore).length;content+=`<div class="notice notice-teal">🎉 <strong>Voting is closed.</strong> Congratulations to the top idea${wc>1?"s":""}! Authors are now revealed — these results will inform our 2026 team goals.</div>`;}
    content+=`<div class="stats-grid"><div class="stat-card"><div class="stat-label">Ideas submitted</div><div class="stat-value">${submitted.length}</div></div><div class="stat-card"><div class="stat-label">Total votes cast</div><div class="stat-value">${totalCast}</div></div><div class="stat-card"><div class="stat-label">Members who voted</div><div class="stat-value">${voters}</div></div></div>`;
    if(sorted.length===0){content+=`<div class="empty">No ideas were submitted.</div>`;}
    else{
      const rl=["1st","2nd","3rd"],rc=["rank-gold","rank-silver","rank-bronze"];
      let lastScore=-1,dispRank=0;
      sorted.forEach((idea,idx)=>{
        const v=votesForIdea(idea.id);if(v!==lastScore){dispRank=idx+1;lastScore=v;}
        const isWin=v===topScore&&topScore>0,pct=Math.round(v/maxVotes()*100);
        content+=`<div class="result-card ${isWin?"winner":""}"><div class="result-rank ${dispRank<=3?rc[dispRank-1]:""}">${dispRank<=3?rl[dispRank-1]:`${dispRank}th`}</div><div class="result-body">`;
        content+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:4px;"><div class="result-title">${esc(idea.title)}</div><div class="badge-row">${isWin?`<span class="badge badge-teal">Top idea</span>`:""}</div></div>`;
        const allResultAuthors=[idea.author,...(idea.merged_authors||[])];
        const resultAvatars=allResultAuthors.map((a,i)=>`<div style="${i>0?"margin-left:-8px;":""}">${avatarEl(a)}</div>`).join("");
        const resultNames=allResultAuthors.map(esc).join(" & ");
        content+=`<div class="result-meta"><div style="display:flex;align-items:center;">${resultAvatars}</div> ${resultNames}${idea.merged?` <span class="badge badge-orange" style="margin-left:4px;">Merged</span>`:""} &middot; ${esc(idea.category||"Uncategorized")}${idea.impact?` &middot; Impact: ${esc(idea.impact)}`:""}</div>`;
        if(idea.description) content+=`<div style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:8px 0;">${esc(idea.description)}</div>`;
        content+=`<div class="bar-row"><div class="bar-bg"><div class="bar-fill ${isWin?"bar-fill-teal":"bar-fill-purple"}" style="width:${pct}%"></div></div><div class="bar-votes">${v} vote${v!==1?"s":""}</div></div></div></div>`;
      });
    }
    if(isAdmin()) content+=`<div class="panel panel-admin" style="margin-top:1rem;"><div class="panel-title">Admin controls</div><div style="font-size:13px;color:var(--text-secondary);">Need to re-open a prior phase? Use the phase tabs above.</div></div>`;
  }

  document.getElementById("root").innerHTML=`
    <div class="app">
      <div class="header"><h1>LPI 2026 goals</h1><p>Ideate, refine, and vote on our team's initiatives for the year ahead.</p></div>
      <div class="user-row">
        <span style="font-size:13px;color:var(--text-secondary);">Signed in as <strong>${esc(currentUser)}</strong></span>
        ${isAdmin()?`<span class="badge badge-purple">admin</span>`:`<span class="badge badge-gray">team member</span>`}
        <button class="signout-btn" onclick="showChangePinScreen()">Change PIN</button>
        <span style="color:var(--border-md);">·</span>
        <button class="signout-btn" onclick="doSignOut()">Sign out</button>
      </div>
      ${tabs}${content}
    </div>`;
}

// ── Boot ─────────────────────────────────────────────────────────────────────

initAuth();
</script>
</body>
</html>
